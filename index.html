<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح رابط الاختصار</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 350px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
        }
        button:active {
            transform: scale(0.97);
        }
        .link {
            margin-top: 20px;
            font-size: 11px;
            color: #999;
            word-break: break-all;
        }
        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ فتح الاختصار</h1>
        <p>اضغط الزر لفتح رابط iCloud</p>
        
        <button onclick="openShortcut()">
            🚀 افتح الاختصار
        </button>
        
        <div class="status" id="status"></div>
        <div class="link">
            الرابط: https://www.icloud.com/shortcuts/a8426d05ced04db292d849a1bf0ffe69
        </div>
    </div>

    <script>
        function openShortcut() {
            let statusDiv = document.getElementById("status");
            statusDiv.innerHTML = "⏳ جاري الفتح...";
            
            // الرابط اللي أعطيتني إياه (حتى لو ما يشتغل)
            window.location.href = "https://www.icloud.com/shortcuts/a8426d05ced04db292d849a1bf0ffe69";
            
            setTimeout(function() {
                statusDiv.innerHTML = "✅ تم محاولة فتح الرابط";
            }, 1000);
        }
    </script>
</body>
</html>
