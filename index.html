<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فتح التطبيق مباشرة</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 100%;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            width: 100%;
            margin-bottom: 15px;
        }
        button:active {
            transform: scale(0.97);
        }
        .note {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📱 فتح التطبيق</h1>
        <p>اضغط الزر لفتح التطبيق <strong>مباشرة</strong></p>
        
        <!-- غير الرابط أدناه إلى رابط التطبيق الذي تريده -->
        <button onclick="window.location.href='shortcuts://open-app?app-id=com.apple.Preferences'">
            🚀 فتح التطبيق
        </button>
        
        <div class="note">
            هذا الرابط يفتح التطبيق مباشرة دون المرور على تطبيق الاختصارات
        </div>
    </div>
</body>
</html>
