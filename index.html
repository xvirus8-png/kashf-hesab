<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Google Drive Demo</title>
</head>
<body>

<h2>عرض ملفات Google Drive</h2>

<button onclick="handleAuthClick()">عرض الملفات</button>
<div id="files"></div>

<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>

<script>
const CLIENT_ID = "503826285883-45mi9qcd6vldrkbanu6me6fpqg5dghqs.apps.googleusercontent.com";
const API_KEY = "AIzaSyDwMM73FaT5snh18bs1WEE1A5pnXlGaD1M";

const DISCOVERY_DOC = "https://www.googleapis.com/discovery/v1/apis/drive/v3/rest";
const SCOPES = "https://www.googleapis.com/auth/drive.readonly";

let tokenClient;

function handleAuthClick() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) return;

      await gapi.client.init({
        apiKey: API_KEY,
        discoveryDocs: [DISCOVERY_DOC],
      });

      const response = await gapi.client.drive.files.list({
        pageSize: 10,
        fields: "files(id, name)"
      });

      let html = "";
      response.result.files.forEach(file => {
        html += "<p>" + file.name + "</p>";
      });

      document.getElementById("files").innerHTML = html;
    },
  });

  tokenClient.requestAccessToken();
}
</script>

</body>
</html>
