<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشغيل الاختصار m</title>
</head>
<body style="text-align: center; padding: 50px;">
    <button onclick="runShortcut()" style="font-size: 20px; padding: 15px 30px;">
        اضغط لتشغيل الاختصار m
    </button>

    <script>
        function runShortcut() {
            // محاولة فتح الرابط بطريقة مختلفة
            window.location.assign("shortcuts://run-shortcut?name=m");
        }
    </script>
</body>
</html>
