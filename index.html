<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تشغيل الاختصار m</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            max-width: 350px;
            width: 100%;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: #333;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.97);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .note {
            margin-top: 25px;
            font-size: 12px;
            color: #999;
        }
        .status {
            margin-top: 15px;
            font-size: 13px;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚡ m</h1>
        <p>اضغط الزر لفتح الاختصار</p>
        <button onclick="runShortcutM()">▶ تشغيل الاختصار m</button>
        <div class="status" id="status"></div>
        <div class="note">
            ملاحظة: سيفتح تطبيق الاختصارات<br>
            ويشغل الاختصار الذي اسمه <strong>m</strong>
        </div>
    </div>

    <script>
        function runShortcutM() {
            let statusDiv = document.getElementById("status");
            statusDiv.innerHTML = "⏳ جاري تشغيل الاختصار...";
            
            // الرابط المباشر لتشغيل الاختصار m
            window.location.href = "shortcuts://run-shortcut?name=m";
            
            // إذا لم يفتح الاختصار خلال ثانية (يعني الرابط ما اشتغل)
            setTimeout(function() {
                statusDiv.innerHTML = "⚠️ إذا لم يعمل، تأكد أن:\n1. الاختصار اسمه 'm' بالضبط\n2. مسموح للتطبيقات بفتح الروابط";
            }, 1000);
        }
    </script>
</body>
</html>
