<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلب كشف حساب</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
background:#f5f7fa;
font-family:system-ui;
padding-bottom:120px;
}

.container{
max-width:600px;
margin:auto;
padding:15px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.top-bar h1{
font-size:22px;
font-weight:800;
}

.top-bar-left{
display:flex;
align-items:center;
gap:10px;
}

.menu-btn{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#fff;
box-shadow:0 4px 12px rgba(0,0,0,.08);
font-size:22px;
cursor:pointer;
}

.logo{
width:45px;
height:45px;
border-radius:50%;
background:#0d6efd;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

.card{
background:#fff;
padding:18px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.06);
margin-bottom:15px;
}

.section-title{
font-weight:800;
margin-bottom:12px;
display:flex;
align-items:center;
gap:6px;
}

.input-group{
margin-bottom:15px;
}

.input-group label{
display:block;
font-weight:700;
margin-bottom:6px;
font-size:14px;
}

.input-group input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

.quick-brands{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:8px;
}

.brand-btn{
padding:6px;
border-radius:14px;
border:2px solid #e3e3e3;
background:#fff;
font-weight:800;
font-size:16px;
cursor:pointer;
height:38px;
display:flex;
align-items:center;
justify-content:center;
}

.brand-btn.active{
background:#0d6efd;
color:#fff;
border-color:#0d6efd;
}

.info-box{
background:#f4f7ff;
padding:12px;
border-radius:12px;
margin-top:10px;
}

.info-row{
display:flex;
justify-content:space-between;
margin-bottom:8px;
gap:10px;
}

.bottom-bar{
position:fixed;
bottom:0;
right:0;
left:0;
background:#fff;
border-top:1px solid #eee;
padding:12px;
z-index:10;
}

.bottom-wrap{
max-width:600px;
margin:auto;
display:flex;
gap:10px;
}

.btn{
flex:1;
padding:14px;
border:none;
border-radius:14px;
font-weight:800;
font-size:16px;
cursor:pointer;
}

.btn-primary{
background:#0d6efd;
color:#fff;
}

.btn-secondary{
background:#eee;
}

/* شاشة البحث */
#searchOverlay{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#fff;
z-index:999;
display:none;
padding:15px;
}

.search-top{
display:flex;
gap:10px;
margin-bottom:12px;
}

#searchInput{
flex:1;
padding:14px;
border-radius:14px;
border:1px solid #ddd;
font-size:16px;
}

#searchResults{
max-height:70vh;
overflow:auto;
}

.search-item{
padding:8px 12px;
border-bottom:1px solid #eee;
cursor:pointer;
font-size:15px;
line-height:1.2;
}

.search-item:hover{
background:#f5f7fa;
}

.search-brand-box{
background:#f4f7ff;
border:1px solid #dbe4ff;
padding:12px 14px;
border-radius:14px;
margin-bottom:12px;
font-weight:800;
color:#0d6efd;
}

/* القائمة الجانبية */
.sidebar-overlay{
position:fixed;
top:0;
right:0;
left:0;
bottom:0;
background:rgba(0,0,0,.35);
z-index:1000;
display:none;
}

.sidebar{
position:fixed;
top:0;
right:-280px;
width:280px;
height:100%;
background:#fff;
z-index:1001;
padding:20px;
box-shadow:-4px 0 16px rgba(0,0,0,.12);
transition:.25s;
}

.sidebar.open{
right:0;
}

.sidebar-overlay.show{
display:block;
}

.sidebar-title{
font-size:20px;
font-weight:800;
margin-bottom:20px;
}

.sidebar-item{
display:flex;
align-items:center;
gap:10px;
padding:14px;
border-radius:12px;
background:#f7f8fb;
margin-bottom:10px;
cursor:pointer;
font-weight:700;
}

.sidebar-item i{
font-size:20px;
color:#0d6efd;
}

.hidden-file{
display:none;
}
</style>
</head>

<body>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="sidebar" id="sidebar">
  <div class="sidebar-title">القائمة</div>

  <div class="sidebar-item" onclick="document.getElementById('excelFile').click(); toggleSidebar();">
    <i class="bi bi-file-earmark-excel"></i>
    <span>استيراد Excel</span>
  </div>

  <div class="sidebar-item" onclick="deleteSavedData(); toggleSidebar();">
    <i class="bi bi-trash3"></i>
    <span>حذف البيانات</span>
  </div>

  <input type="file" id="excelFile" class="hidden-file" accept=".xlsx,.xls">
</div>

<div class="container">

  <div class="top-bar">
    <div class="top-bar-left">
      <button class="menu-btn" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
      </button>
      <h1>طلب كشف حساب</h1>
    </div>

    <div class="logo">
      <i class="bi bi-receipt"></i>
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <i class="bi bi-person"></i>
      بيانات الطلب
    </div>

    <div class="input-group">
      <label>اختر البراند</label>

      <div class="quick-brands">
        <button type="button" class="brand-btn" onclick="setBrand('FOREVER',this)">FOREVER</button>
        <button type="button" class="brand-btn" onclick="setBrand('CHARACTER',this)">CHARACTER</button>
        <button type="button" class="brand-btn" onclick="setBrand('ROSELLA',this)">ROSELLA</button>
        <button type="button" class="brand-btn" onclick="setBrand('FUTURE',this)">FUTURE</button>
      </div>
    </div>

    <div class="input-group">
      <label>اسم الزبون</label>
      <input type="text" id="customerName" placeholder="اضغط للبحث" onclick="openSearch()" readonly>
    </div>
  </div>

  <div class="card">
    <div class="section-title">
      <i class="bi bi-eye"></i>
      المعاينة
    </div>

    <div class="info-box">
      <div class="info-row">
        <div>البراند</div>
        <div id="previewBrand">—</div>
      </div>

      <div class="info-row">
        <div>اسم الزبون</div>
        <div id="previewCustomer">—</div>
      </div>
    </div>
  </div>

</div>

<div class="bottom-bar">
  <div class="bottom-wrap">
    <button class="btn btn-secondary" onclick="clearForm()">تفريغ</button>
    <button class="btn btn-primary" onclick="submitRequest()">إرسال الطلب</button>
  </div>
</div>

<div id="searchOverlay">
  <div class="search-brand-box" id="searchBrandTitle">البراند: —</div>

  <div class="search-top">
    <input type="text" id="searchInput" placeholder="ابحث عن اسم الزبون">
    <button class="btn btn-secondary" style="flex:0 0 auto;padding:12px 16px" onclick="closeSearch()">إلغاء</button>
  </div>

  <div id="searchResults"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, get, child, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDaQ7Ur6f7_ugSTy2_u0-gPEtUsFzhh82U",
  authDomain: "kashf-system.firebaseapp.com",
  databaseURL: "https://kashf-system-default-rtdb.firebaseio.com",
  projectId: "kashf-system",
  storageBucket: "kashf-system.firebasestorage.app",
  messagingSenderId: "987561323340",
  appId: "1:987561323340:web:19d72fce8456f2fdf9bde9"
});

const db = getDatabase(app);

const DELETE_PASSWORD = "1564";

let selectedBrand = "";

let customersByBrand = {
  FOREVER: [],
  CHARACTER: [],
  ROSELLA: [],
  FUTURE: []
};

const previewCustomer = document.getElementById("previewCustomer");
const previewBrand = document.getElementById("previewBrand");
const overlay = document.getElementById("searchOverlay");
const searchInput = document.getElementById("searchInput");
const results = document.getElementById("searchResults");
const searchBrandTitle = document.getElementById("searchBrandTitle");

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
  document.getElementById("sidebarOverlay").classList.toggle("show");
}

window.toggleSidebar = toggleSidebar;

function setBrand(brand, btn){
  selectedBrand = brand;

  document.querySelectorAll(".brand-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  previewBrand.textContent = brand;
  document.getElementById("customerName").value = "";
  previewCustomer.textContent = "—";
}

window.setBrand = setBrand;

function clearForm(){
  selectedBrand = "";
  previewCustomer.textContent = "—";
  previewBrand.textContent = "—";
  document.getElementById("customerName").value = "";
  document.querySelectorAll(".brand-btn").forEach(b => b.classList.remove("active"));
}

window.clearForm = clearForm;

function openSearch(){
  if(!selectedBrand){
    alert("اختر البراند اولاً");
    return;
  }

  overlay.style.display = "block";
  searchInput.value = "";
  searchBrandTitle.textContent = "البراند المختار: " + selectedBrand;
  searchInput.focus();
  renderResults(customersByBrand[selectedBrand] || []);
}

window.openSearch = openSearch;

function closeSearch(){
  overlay.style.display = "none";
}

window.closeSearch = closeSearch;

searchInput.addEventListener("input", () => {
  const text = searchInput.value.trim().toLowerCase();
  const list = (customersByBrand[selectedBrand] || []).filter(name =>
    String(name).toLowerCase().includes(text)
  );
  renderResults(list);
});

function renderResults(list){
  results.innerHTML = "";

  if(list.length === 0){
    results.innerHTML = '<div class="search-item">ماكو نتائج</div>';
    return;
  }

  list.forEach(name => {
    const div = document.createElement("div");
    div.className = "search-item";
    div.innerText = name;

    div.onclick = () => {
      document.getElementById("customerName").value = name;
      previewCustomer.textContent = name;
      closeSearch();
    };

    results.appendChild(div);
  });
}

async function sendRequestToFirebase(message, customer, brand){
  await set(ref(db, "requests/latest"), {
    text: message,
    customer: customer,
    brand: brand,
    status: "new",
    time: Date.now()
  });
}

async function saveCustomersToFirebase(data){
  await set(ref(db, "customersByBrand"), data);
}

async function loadCustomersFromFirebase(){
  const snapshot = await get(child(ref(db), "customersByBrand"));
  if(snapshot.exists()){
    return snapshot.val();
  }
  return null;
}

async function deleteCustomersFromFirebase(){
  await remove(ref(db, "customersByBrand"));
}

async function loadFirebaseCustomers(){
  try{
    const firebaseData = await loadCustomersFromFirebase();

    if(firebaseData && typeof firebaseData === "object"){
      customersByBrand = {
        FOREVER: Array.isArray(firebaseData.FOREVER) ? firebaseData.FOREVER : [],
        CHARACTER: Array.isArray(firebaseData.CHARACTER) ? firebaseData.CHARACTER : [],
        ROSELLA: Array.isArray(firebaseData.ROSELLA) ? firebaseData.ROSELLA : [],
        FUTURE: Array.isArray(firebaseData.FUTURE) ? firebaseData.FUTURE : []
      };
    }else{
      customersByBrand = {
        FOREVER: [],
        CHARACTER: [],
        ROSELLA: [],
        FUTURE: []
      };
    }
  }catch(error){
    console.log("تعذر تحميل الزباين من Firebase", error);
    customersByBrand = {
      FOREVER: [],
      CHARACTER: [],
      ROSELLA: [],
      FUTURE: []
    };
  }
}

async function deleteSavedData(){
  const password = prompt("ادخل الباسورد لحذف البيانات");
  if(password === null) return;

  if(password !== DELETE_PASSWORD){
    alert("الباسورد غير صحيح");
    return;
  }

  try{
    await deleteCustomersFromFirebase();
  }catch(error){
    console.log("تعذر حذف بيانات Firebase", error);
  }

  customersByBrand = {
    FOREVER: [],
    CHARACTER: [],
    ROSELLA: [],
    FUTURE: []
  };

  clearForm();
  closeSearch();
  results.innerHTML = "";

  alert("تم حذف البيانات السحابية بنجاح");
}

window.deleteSavedData = deleteSavedData;

document.getElementById("excelFile").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = async function(evt){
    try{
      const data = new Uint8Array(evt.target.result);
      const workbook = XLSX.read(data, {type:"array"});
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet);

      if(!rows.length){
        alert("فشل الاستيراد: ملف الإكسل فارغ");
        return;
      }

      const firstRow = rows[0];
      const hasName = Object.prototype.hasOwnProperty.call(firstRow, "الاسم");
      const hasBrand = Object.prototype.hasOwnProperty.call(firstRow, "البراند");

      if(!hasName || !hasBrand){
        alert("فشل الاستيراد: لازم تكون الأعمدة باسم (الاسم) و(البراند)");
        return;
      }

      let importedCount = 0;
      let skippedCount = 0;

      const newCustomersByBrand = {
        FOREVER: [],
        CHARACTER: [],
        ROSELLA: [],
        FUTURE: []
      };

      rows.forEach((row) => {
        const name = String(row["الاسم"] || "").trim();
        const brand = String(row["البراند"] || "").trim().toUpperCase();

        if(!name || !brand){
          skippedCount++;
          return;
        }

        if(!newCustomersByBrand[brand]){
          newCustomersByBrand[brand] = [];
        }

        if(!newCustomersByBrand[brand].includes(name)){
          newCustomersByBrand[brand].push(name);
          importedCount++;
        }
      });

      if(importedCount === 0){
        alert("فشل الاستيراد: ما تم استيراد أي اسم جديد");
        return;
      }

      customersByBrand = newCustomersByBrand;
      await saveCustomersToFirebase(customersByBrand);

      alert("تم الاستيراد السحابي بنجاح. عدد الأسماء الجديدة: " + importedCount + (skippedCount ? " | أسطر مهملة: " + skippedCount : ""));
    }catch(error){
      alert("فشل الاستيراد: " + error.message);
    }finally{
      e.target.value = "";
    }
  };

  reader.onerror = function(){
    alert("فشل الاستيراد: تعذر قراءة الملف");
    e.target.value = "";
  };

  reader.readAsArrayBuffer(file);
});

async function submitRequest(){
  const customer = document.getElementById("customerName").value.trim();
  const brand = selectedBrand;

  if(!customer){
    alert("اختر الزبون");
    return;
  }

  if(!brand){
    alert("اختر البراند");
    return;
  }

  const message = customer + " | " + brand;

  try{
    await sendRequestToFirebase(message, customer, brand);
    alert("تم إرسال الطلب بنجاح");
  }catch(error){
    alert("صار خطأ بالإرسال");
  }
}

window.submitRequest = submitRequest;

await loadFirebaseCustomers();
</script>

</body>
</html>
